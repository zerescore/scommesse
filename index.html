<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerescore Terminal - Area Protetta</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- SCHERMATA DI LOG IN BLINDATA --- */
        #auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #090d16;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .auth-card {
            background: #111827;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #1f2937;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }
        .auth-card h2 {
            color: #f3f4f6;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .auth-card p {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .auth-card input {
            width: 100%;
            padding: 14px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .auth-card input:focus {
            outline: none;
            border-color: #10b981;
        }
        .auth-card button {
            width: 100%;
            padding: 14px;
            background: #10b981;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .auth-card button:hover {
            background: #059669;
        }
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
        /* Interfaccia Principale dell'Applicazione */
        #main-app-content {
            display: none;
        }
    </style>
</head>
<body style="background-color: #0f172a; margin: 0; color: #fff;">

    <div id="auth-overlay">
        <div class="auth-card">
            <h2>🔐 Zerescore Terminal</h2>
            <p>Inserisci il PIN di sblocco per accedere ai dati Moneyball.</p>
            <input type="password" id="pin-input" placeholder="••••••••" onkeypress="checkEnter(event)">
            <button onclick="validaAccesso()">Sblocca Terminale</button>
            <div id="error-notification" class="error-msg">PIN errato. Accesso negato.</div>
        </div>
    </div>

    <div id="main-app-content">
        <div style="padding: 20px;">
            <h1>Benvenuto nel Terminale Zerescore</h1>
            <p>Sistema di controllo e allineamento dati live attivo.</p>
            <div id="tabella-campionati"></div>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE SICUREZZA & CHIAVI ANODIZZATE
        const PASS_SICURA = "Mister2026"; 

        // Rilevamento automatico Ambiente (PC locale vs Cloud Vercel)
        const isLocale = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        const supabaseUrl = isLocale ? "INSERISCI_QUI_IL_TUO_URL_SUPABASE_PER_I_TEST_SU_PC" : window.__ENV_SUPABASE_URL__;
        const supabaseKey = isLocale ? "INSERISCI_QUI_LA_TUA_ANON_KEY_PER_I_TEST_SU_PC" : window.__ENV_SUPABASE_KEY__;

        let supabase = null;

        function validaAccesso() {
            const inputData = document.getElementById("pin-input").value;
            const errore = document.getElementById("error-notification");

            if (inputData === PASS_SICURA) {
                // Distrugge la schermata di blocco e attiva la dashboard
                document.getElementById("auth-overlay").style.display = "none";
                document.getElementById("main-app-content").style.display = "block";
                
                // Inizializza Supabase in modo sicuro solo ad accesso eseguito
                if (supabaseUrl && supabaseKey) {
                    supabase = supabase.createClient(supabaseUrl, supabaseKey);
                    console.log("Supabase connesso in modo sicuro. Caricamento dati...");
                    // Qui puoi richiamare la tua vecchia funzione caricaDati() se presente
                }
            } else {
                errore.style.display = "block";
                document.getElementById("pin-input").value = "";
            }
        }

        function checkEnter(event) {
            if (event.key === "Enter") {
                validaAccesso();
            }
        }
    </script>
</body>
</html>
