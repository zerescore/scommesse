<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerescore Terminal - Area Protetta</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- SCHERMATA DI LOG IN BLINDATA --- */
        #auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #090d16;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .auth-card {
            background: #111827;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #1f2937;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }
        .auth-card h2 {
            color: #f3f4f6;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .auth-card p {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .auth-card input[type="password"] {
            width: 100%;
            padding: 14px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .auth-card input[type="password"]:focus {
            outline: none;
            border-color: #10b981;
        }
        .remember-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            color: #9ca3af;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }
        .remember-container input {
            cursor: pointer;
            accent-color: #10b981;
            width: 16px;
            height: 16px;
        }
        .auth-card button {
            width: 100%;
            padding: 14px;
            background: #10b981;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .auth-card button:hover {
            background: #059669;
        }
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
        #main-app-content {
            display: none;
        }
    </style>
</head>
<body style="background-color: #0f172a; margin: 0; color: #fff;">

    <div id="auth-overlay">
        <div class="auth-card">
            <h2>🔐 Zerescore Terminal</h2>
            <p>Inserisci il PIN di sblocco per accedere ai dati Moneyball.</p>
            <input type="password" id="pin-input" placeholder="••••••••" onkeypress="checkEnter(event)">
            
            <label class="remember-container">
                <input type="checkbox" id="remember-me">
                Ricorda la password su questo dispositivo
            </label>

            <button onclick="validaAccesso()">Sblocca Terminale</button>
            <div id="error-notification" class="error-msg">PIN errato. Accesso negato.</div>
        </div>
    </div>

    <div id="main-app-content">
        <div style="padding: 20px;">
            <h1>Benvenuto nel Terminale Zerescore</h1>
            <p>Sistema di controllo e allineamento dati live attivo.</p>
            <div id="tabella-campionati"></div>
        </div>
    </div>

    <script>
        const PASS_SICURA = "Mister2026"; 

        // CONTROLLO AUTOMATICO RICORDAMI ALL'AVVIO
        window.addEventListener('DOMContentLoaded', () => {
            const sessioneSalvata = localStorage.getItem('zerescore_logged');
            if (sessioneSalvata === 'true') {
                mostraApplicazione();
            }
        });

        function mostraApplicazione() {
            document.getElementById("auth-overlay").style.display = "none";
            document.getElementById("main-app-content").style.display = "block";
            console.log("Accesso eseguito. Terminale sbloccato.");
        }

        function validaAccesso() {
            const inputData = document.getElementById("pin-input").value;
            const errore = document.getElementById("error-notification");
            const ricordaSpuntato = document.getElementById("remember-me").checked;

            if (inputData === PASS_SICURA) {
                if (ricordaSpuntato) {
                    localStorage.setItem('zerescore_logged', 'true');
                }
                mostraApplicazione();
            } else {
                errore.style.display = "block";
                document.getElementById("pin-input").value = "";
            }
        }

        function checkEnter(event) {
            if (event.key === "Enter") {
                validaAccesso();
            }
        }
    </script>
</body>
</html>
